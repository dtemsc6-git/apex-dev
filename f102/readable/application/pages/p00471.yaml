    table-name: SGT_ARCHIVOS
    include-rowid-column: false
    where-clause: |
      (:P471_tipo_entidad is null or entidad = :P471_tipo_entidad) 
      AND 
      (:P471_F_PK_ID is null  or pk_id = :P471_F_PK_ID)
      and 
