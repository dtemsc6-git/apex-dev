  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select ID,
             ENTIDAD,
             PK_ID,
             COMENTARIO,
             CREADO_POR,
             SUBSTR(CREADO_POR, 1, 2) iniciales,
             CREADO_EL,
             actualizado_POR,
             actualizado_EL
        from SGT_COMENTARIOS
       where entidad =:P32_ENTIDAD and pk_id = :P32_PK_ID
    page-items-to-submit: 
    - P32_ENTIDAD
    - P32_PK_ID

  order-by: 
    type: Item
    item: 
      item-name: P32_ORDER_BY
      order-bys: 
      - key: CREADO_EL
        clause: 1 desc

      - key: Comentarios
        clause: 2 asc

      - key: CREADO_POR
        clause: 3 asc

