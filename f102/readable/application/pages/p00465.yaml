- # ====== Region: INTERFACES ==================================
  id: 9351123647692625
  identification: 
    name: INTERFACES
    title: Interfaces
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select 
             NOMBRE,
             ETIQUETA,
             ESTADO,
             TX_EN_DBM,
             RX_EN_DBM,
             MAC_ADDRESS,
             VELOCIDAD_MBPS
      
        from SGT_INTERFACES
      
       where EQUIPO_ID=:P465_EQUIPO_ID 
       and id not in (select interfaz_a_id from sgt_equipos_wan where equipo_a_id =:P465_EQUIPO_ID and interfaz_a_id is not null)
       and id not in (select interfaz_a_id from sgt_equipos_servicio where equipo_a_id =:P465_EQUIPO_ID and interfaz_a_id is not null)
       order by nombre
    page-items-to-submit: 
    - P465_EQUIPO_ID

  order-by: 
    type: None

  layout: 
    sequence: 30
    parent-region: Selector # 9348733014692601
    slot: SUB_REGIONS
