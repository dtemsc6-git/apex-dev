  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select e.ID,
      
             --2026-06-11: dmf: agregar campos faltantes para el IR
             /*
             --E.SITIO_ID,
             z.id ZONA_ID, 
             s.id SITIO_ID, 
             s.nombre SITIO, 
             s.siglas SITIOS_SIGLAS,
             sa.id SALA_ID, 
             sa.nombre SALA, 
             sa.siglas SALA_SIGLAS,
             ra.nombre RACK,
             E.OBSERVACIONES,
              --'<li><a class="btn-acciones" href="#" data-items="P470_ENTIDAD,P470_PK_ID" data-values="4,' || e.ID ||'">Imágenes</a></li>' || 
              --'<li><a href='||APEX_UTIL.PREPARE_URL('f?p=&APP_ID.:465:&APP_SESSION.::::P465_EQUIPO_ID:'|| e.ID )||'>Dependencias</a></li>' || 
              --'<li><a href='||APEX_UTIL.PREPARE_URL('f?p=&APP_ID.:7:&APP_SESSION.::::P7_ID:'|| e.ID )||'>Historial Audit.</a></li>' || 
              -- '<li><a href='||APEX_UTIL.PREPARE_URL('f?p=&APP_ID.:14:&APP_SESSION.::::P14_ID:'|| e.ID )||'>Auditoria</a></li>' ||   
      
             */ 
      
             z.nombre ZONA, 
             DEPTO.NOMBRE DEPARTAMENTO,
             ciudad.nombre CIUDAD,
      
             '<ul class="ul-acciones">' ||
              '<li><a href='||APEX_PAGE.GET_URL( p_page => 66, p_items => 'P66_ID', p_values => e.ID )||'>Editar</a></li>' || 
              '<li><a href='||APEX_PAGE.GET_URL(p_page => 470, p_items => 'P470_ENTIDAD,P470_PK_ID', p_values => '4,' || e.ID ) ||'>Imágenes</a></li>' || 
              '<li><a href='||APEX_PAGE.GET_URL(p_page => 465, p_items => 'P465_EQUIPO_ID' ,p_values => e.ID )||'>Dependencias</a></li>' || 
              '<li><a href='||APEX_PAGE.GET_URL(p_page => 7, p_items => 'P7_ID' ,p_values => e.ID )||'>Historial Audit.</a></li>' || 
             '</ul>'
             as ACCIONES,
             E.UNIDAD_ENCARGADA,
             E.RACK_ID RACK_NOMBRE,
             E.RACK_ID,
             E.U,
             E.TIPO_RED,
             E.NOMBRE,
             E.ID as FULL_NAME,
             E.TIPO_EQUIPO_ID,
             te.grupo_equipo as SUB_TIPO, 
             E.MARCA,
             E.MODELO,
             E.ESTADO,
             E.NI_ANDE,
             E.SERIAL_NUMBER,
             E.VERSION_HARDWARE,
             E.VERSION_SOFTWARE,
             E.VERSION_PATCH,
             E.IP_GESTION,
             E.ALIMENTACION1_ID,
             E.ALIMENTACION2_ID,
             E.PROYECTO_ID,
             E.FECHA_IMPLE,
             E.ALTURA_U,
             E.POSICION,
             nvl(C.COMENTARIO,'Ver') AS COMENTARIOS,
             E.CREADO_POR,
             E.CREADO_EL,
             E.ACTUALIZADO_POR,
             E.ACTUALIZADO_EL
        from SGT_EQUIPOS e
        
        left JOIN sgt_racks  ra     on ra.id = e.rack_id
        left JOIN SGT_SALAS  sa     on sa.id = ra.sala_id
        left join sgt_sitios s      on s.id = sa.sitio_id
        left join sgt_zonas  z      on z.id = s.zona_id
      
        left join sgt_ciudad ciudad on ciudad.id = s.ciudad_id
        left join SGT_DEPTO  depto  on depto.id = ciudad.depto_id  
        
        JOIN SGT_TIPO_EQUIPOS te on te.id = e.tipo_equipo_id
      
      
      --Agregar comentarios
      LEFT JOIN (
          SELECT PK_ID, 
                 COMENTARIO, 
                 ROW_NUMBER() OVER (PARTITION BY PK_ID ORDER BY CREADO_EL DESC) AS rn
          FROM SGT_COMENTARIOS
          WHERE ENTIDAD = 4
      ) C ON C.PK_ID = E.ID AND C.rn = 1
      
      /*OUTER APPLY (
          SELECT COMENTARIO
          FROM SGT_COMENTARIOS C
          WHERE C.ENTIDAD = 4
            AND C.PK_ID = E.ID
          ORDER BY C.CREADO_EL DESC
          FETCH FIRST 1 ROW ONLY
      ) C*/  
       -- order by e.actualizado_el DESC

