dynamic-actions: 
- # ====== Dynamic Action: CLICK_ACCIONES ======================
  id: 11741791036785349
  identification: 
    name: CLICK_ACCIONES

  execution: 
    sequence: 20
    event-scope: Dynamic
    static-container-(jquery-selector): .a-IRR-table
    type: Immediate

  when: 
    event: Click
    selection-type: jQuery Selector
    jquery-selector: .btn-acciones

  actions: 
  - # ====== Action: GET_URL =====================================
    id: 11741931454785350
    identification: 
      name: GET_URL
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        DECLARE
        
        R_URL varchar2(4000);
        BEGIN
        
        SELECT APEX_PAGE.GET_URL (
                    p_page   => 1,
                    p_items  => :P13_ITEMS,
                    p_values => :P13_VALUES ) into R_URL         
             FROM DUAL;
            
         :P13_RESULT := R_URL;
        
        
        END;

    execution: 
      sequence: 40
      event: CLICK_ACCIONES # 11741791036785349
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

  - # ====== Action: SET_ITEMS ===================================
    id: 11742004531785351
    identification: 
      name: SET_ITEMS
      action: Set Value

    settings: 
      set-type: JavaScript Expression
      javascript-expression: this.triggeringElement.dataset.items
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P13_ITEMS

    execution: 
      sequence: 20
      event: CLICK_ACCIONES # 11741791036785349
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

  - # ====== Action: SET_VALUES ==================================
    id: 11742390485785355
    identification: 
      name: SET_VALUES
      action: Set Value

    settings: 
      set-type: JavaScript Expression
      javascript-expression: this.triggeringElement.dataset.values
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P13_VALUES

    execution: 
      sequence: 30
      event: CLICK_ACCIONES # 11741791036785349
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

  - # ====== Action: Execute JavaScript Code =====================
    id: 11742456411785356
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: console.log(this.triggeringElement.dataset)

    execution: 
      sequence: 10
      event: CLICK_ACCIONES # 11741791036785349
      fire-when-event-result-is: True
      fire-on-initialization: false

