        name: SITIOS
        layer-type: Points

      label: 
        label: SITIOS

      layout: 
        sequence: 10

      source: 
        location: Local Database
        type: SQL Query
        sql-query: |2
           select s.ID,
                 SIGLAS,
                 s.NOMBRE,
                 s.TIPO_DE_SITIO,
                 PROPIETARIO,
                 ZONA_ID,
                 CIUDAD_ID,
                 LATITUD_OLD,
                 LONGITUD_OLD,
                 "UBICACIÓN",
                 OBSERVACION,
                 s.CREADO_POR,
                 s.CREADO_EL,
                 s.MODIFICADO_POR,
                 s.MODIFICADO_EL,
                 LATITUD,
                 LONGITUD
            from SGT_SITIOS s
          
              
          
          where 1=1 and 
          
          (:P65_ZONAS is null or s.id in (select id from sgt_sitios s where s.zona_id = :P65_ZONAS))
          
          and
          
          (:P65_enlaces_fo is null or S.ID IN 
          (SELECT sitio_id_a from sgt_enlaces_fo where id = :P65_enlaces_fo
          union
          SELECT sitio_id_b from sgt_enlaces_fo where id = :P65_enlaces_fo
          ) )
          
        page-items-to-submit: 
        - P65_ZONAS
        - P65_ENLACES_FO
        use-spatial-index: false

