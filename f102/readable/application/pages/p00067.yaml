- # ====== Region: Search Results ==============================
  id: 14728534760941068
  identification: 
    name: Search Results
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select sitio.id as sitio_id, sitio.nombre as sitio_nombre, null as sala_id, null as sala_nombre, null as rack_id, null as rack_nombre,
      null as equipo_id, null as equipo_nombre, comentario, sgt_comentarios.actualizado_el as actualizado_el 
      
      from sgt_sitios sitio join sgt_comentarios on pk_id = sitio.id
      where entidad = 1 
      
      union all 
      
      select sitio.id as sitio_id, sitio.nombre as sitio_nombre, salas.id as sala_id, salas.nombre as sala_nombre, null as rack_id, null as rack_nombre,
      null as equipo_id, null as equipo_nombre, comentario, sgt_comentarios.actualizado_el as actualizado_el
      
      from sgt_sitios sitio 
      join sgt_salas salas on salas.sitio_id = sitio.id
      join sgt_comentarios on pk_id = salas.id
      where entidad = 2 
      
      union all 
      
      --Comentarios de los racks
      select sitio.id as sitio_id, sitio.nombre as sitio_nombre, salas.id as sala_id, salas.nombre as sala_nombre, racks.id as rack_id, racks.nombre as rack_nombre,
      null as equipo_id, null as equipo_nombre, comentario , sgt_comentarios.actualizado_el as actualizado_el
      
      from sgt_sitios sitio 
      join sgt_salas salas on salas.sitio_id = sitio.id
      join sgt_racks racks on racks.sala_id = salas.id
      join sgt_comentarios on pk_id = racks.id
      where entidad = 3 
      
      union all
      --vista de los comentarios de los equipos
      
      select sitio.id as sitio_id, sitio.nombre as sitio_nombre, salas.id as sala_id, salas.nombre as sala_nombre, racks.id as rack_id, racks.nombre as rack_nombre,
      equipos.id as equipo_id, equipos.nombre as equipo_nombre, comentario , sgt_comentarios.actualizado_el as actualizado_el
      
      from sgt_sitios sitio 
      join sgt_salas salas on salas.sitio_id = sitio.id
      join sgt_racks racks on racks.sala_id = salas.id
      join sgt_equipos equipos on equipos.rack_id = racks.id
      join sgt_comentarios on pk_id = equipos.id
      where entidad = 4

