    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT
          AUDIT_ID,
          FECHA_HORA,
          USUARIO,
          TIPO_COMPONENTE                                       AS COMPONENTE,
          TIPO_OPERACION                                        AS ACCION,
          DETALLE_OLD_VALUE                                     AS OLD_VALUE,
          DETALLE_NEW_VALUE                                     AS NEW_VALUE
