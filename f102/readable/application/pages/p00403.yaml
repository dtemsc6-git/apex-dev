- # ====== Page Item: P403_CONEXIONES ==========================
  id: 85693681339263747620
  identification: 
    name: P403_CONEXIONES
    type: Shuttle

  label: 
    label: Conexiones
    alignment: Left

  settings: 
    show-controls: All

  multiple-values: 
    type: Delimited List
    separator: ','

  layout: 
    sequence: 30
    region: Seleccionar las conexiones # 85027400348108935790
    slot: BODY
    alignment: Left
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic
    label-column-span: Page Template Default

  appearance: 
    template: Optional - Floating
    template-options: 
    - '#DEFAULT#'
    height: 10

  validation: 
    value-required: false

  list-of-values: 
    type: SQL Query
    sql-query: |
      SELECT 
          EQUIPO_A || ':' || INTERFAZ_A ||':'|| etiqueta_a 
          || ' > '||  EQUIPO_B || ':' || INTERFAZ_B || ':' || etiqueta_b 
          AS display_value,
          conexiones.id AS return_value
      FROM v_tramos_nombres conexiones
      WHERE conexiones.sitio_a_id IN (
          SELECT column_value FROM apex_string.split_numbers(:P402_SITIOS, ',')
      )
      and (:P403_FILTRAR_TIPO_CONEXION IS NULL OR TIPO_CONEXION = :P403_FILTRAR_TIPO_CONEXION)
      /*
      and 
      TIPO_CONEXION <> 'Trasera'
      
      union
      
       select  EQUIPO_A || ':' || INTERFAZ_A ||':'|| etiqueta_a 
          || ' > '||  EQUIPO_B || ':' || INTERFAZ_B || ':' || etiqueta_b 
          AS display_value,
          t.id AS return_value from v_tramos_nombres t join (   
          select * from sgt_enlaces_tramos
          where tipo_conexion = 'Trasera'
          and
          interfaz_a_id in 
          (
              select iface_a_id int_id from v_tramos_nombres where id in (SELECT column_value FROM apex_string.split_numbers(:P402_SITIOS, ','))
              union
              select iface_b_id int_id from v_tramos_nombres where id in (SELECT column_value FROM apex_string.split_numbers(:P402_SITIOS, ','))
          )
      ) q1
       on t.id = q1.id 
       */
    display-extra-values: true

  cascading-list-of-values: 
    parent-item(s): 
    - P403_FILTRAR_TIPO_CONEXION
    items-to-submit: 
    - P403_FILTRAR_TIPO_CONEXION
    parent-required: true

  advanced: 
    css-classes: 
    - shuttle-sgt
    warn-on-unsaved-changes: Page Default

  source: 
    type: SQL Query (return multiple values)
    sql-query: |
      SELECT ENLACE_TRAMO_ID FROM SGT_CONEXIONES_ENLACE_WAN wan
      where wan.enlace_wan_id = :P401_ID
      ORDER BY SECUENCIA
    used: Only when current value in session state is null

  session-state: 
    storage: Per Session (Persistent)

  security: 
    session-state-protection: Unrestricted
    store-value-encrypted-in-session-state: true
    restricted-characters: All characters can be saved.

