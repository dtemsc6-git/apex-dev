- # ====== Region: Historial Equipo ============================
  id: 9347704261692591
  identification: 
    name: Historial Equipo
    title: Historial
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT
          AUDIT_ID,
          FECHA_HORA,
          USUARIO,
          TIPO_COMPONENTE                                       AS COMPONENTE,
          TIPO_OPERACION                                        AS ACCION,
          DETALLE_OLD_VALUE                                     AS OLD_VALUE,
          DETALLE_NEW_VALUE                                     AS NEW_VALUE
      FROM V_AUDIT_EQUIPOS
      WHERE EQUIPO_ID = TO_CHAR(:P7_ID)
          AND TIPO_OPERACION IN ('UPDATE', 'DELETE', 'Actualización', 'Eliminación')
      ORDER BY FECHA_HORA_FILTRO DESC;
