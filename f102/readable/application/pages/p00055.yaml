      inner join 
        (
          SELECT EQUIPO_A_ID EQUIPO_ID FROM SGT_ENLACES_TRAMOS
          UNION
          SELECT EQUIPO_B_ID EQUIPO_ID FROM SGT_ENLACES_TRAMOS
        ) conexiones
      
      
