      exists  (SELECT 1
            FROM SGT_CONEXIONES_ENLACE_WAN WHERE ENLACE_WAN_ID = :P55_ENLACE_WAN )
       )
       AND 
       (:P55_SERVICIO IS NULL OR
       
      exists  (SELECT 1
            FROM SGT_CONEXIONES_SERVICIO WHERE SERVICIO_ID = :P55_SERVICIO )
       )
       
