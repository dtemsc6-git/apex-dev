- # ====== Page Item: P405_EQUIPOS =============================
  id: 7257286599679340
  identification: 
    name: P405_EQUIPOS
    type: Shuttle

  label: 
    label: Equipos
    alignment: Left

  settings: 
    show-controls: All

  multiple-values: 
    type: Delimited List
    separator: ','

  layout: 
    sequence: 20
    region: Step 3 # 7257914647679346
    slot: BODY
    alignment: Left
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic
    label-column-span: Page Template Default

  appearance: 
    template: Optional - Floating
    template-options: 
    - '#DEFAULT#'
    height: 5

  validation: 
    value-required: false

  list-of-values: 
    type: SQL Query
    sql-query: |
      SELECT e.nombre  display_value,
          e.id return_value
      FROM sgt_equipos e
      inner join sgt_sitios s on e.sitio_id = s.id  
      WHERE s.id IN (
          SELECT column_value FROM apex_string.split_numbers(:P402_SITIOS, ',')
      )
    display-extra-values: true

  advanced: 
    warn-on-unsaved-changes: Page Default

  source: 
    type: SQL Query (return multiple values)
    sql-query: |
      SELECT EQUIPO_ID FROM SGT_EQUIPOS_WAN wan
      where wan.WAN_ID = :P401_ID
      order by seq
    used: Only when current value in session state is null

  session-state: 
    storage: Per Session (Persistent)

  security: 
    session-state-protection: Unrestricted
    store-value-encrypted-in-session-state: true
    restricted-characters: All characters can be saved.

