dynamic-actions: 
- # ====== Dynamic Action: NO_SUBMMIT ==========================
  id: 7258314534679350
  identification: 
    name: NO_SUBMMIT

  execution: 
    sequence: 10
    event-scope: Static
    type: Immediate

  when: 
    event: Key Press
    selection-type: Item(s)
    item(s): 
    - P405_FILTRAR_EQUIPOS

  actions: 
  - # ====== Action: NO_SUBMIT ===================================
    id: 7258405548679351
    identification: 
      name: NO_SUBMIT
      action: Execute JavaScript Code

    settings: 
      code: |
        if (event.key === "Enter") {
            filtrarShuttle();
            event.preventDefault();
            return false;
        }

    execution: 
      sequence: 10
      event: NO_SUBMMIT # 7258314534679350
      fire-when-event-result-is: True
      fire-on-initialization: false

